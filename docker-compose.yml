version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: MangaScrapper/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MongoSettings__ConnectionString=mongodb://mongodb:27017
      - MongoSettings__DatabaseName=manga-scrap
      - JwtSigningKey="I4G5ZR2ZgGtjWWnKtf6InBJpGWwm7IrmM4Mzxu3iUm7"
      - ScrapperSettings__ImageStoragePath=/app/images
      - ScrapperSettings__MaxParallelDownloads=10
      - Cors__AllowedOrigins=*
      - Cors__AllowCredentials=true
      - MeiliSettings__Host=http://meilisearch:7700
      - MeiliSettings__MasterKey=mangas
      - QdrantSettings__Host=http://qdrant:6333
      - QdrantSettings__ApiKey=mangas_qdrant_key
    volumes:
      - ./images:/app/images
      - ./MangaScrapper/provider:/app/provider:ro
      - ./keys:/app/temp-keys
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=manga-scrap
  
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
      
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__API_KEY: "mangas_qdrant_key"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mongo-data:
  meili_data:
  qdrant_data:
